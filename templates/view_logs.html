<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Ambulance Logs</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1>📜 Ambulance Request Logs</h1>
  <div class="tablewrap">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Driver</th><th>Vehicle</th><th>Lane</th><th>Duration</th><th>Time</th>
        </tr>
      </thead>
      <tbody>
        {% for row in logs %}
        <tr>
          <td>{{ row[0] }}</td>
          <td>{{ row[1] }}</td>
          <td>{{ row[2] }}</td>
          <td>{{ row[3] }}</td>
          <td>{{ row[4] }}</td>
          <td>{{ row[5] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <div class="links"><a class="btn" href="{{ url_for('index') }}">⬅ Back</a></div>
</body>
</html>
